# レイヤー別LLMプロバイダ割当設定
# Society モードで各レイヤーの住民にどのプロバイダを割り当てるかの重み

activation_layer:
  # 50-200人の軽量LLM呼び出し（コスト重視）
  weights:
    openai: 1.0
    gemini: 0.0
    anthropic: 0.0
  temperature: 0.75
  max_tokens: 2048

meeting_layer:
  # 5-10人のフルBDI議論（品質重視）
  weights:
    openai: 1.0
    gemini: 0.0
    anthropic: 0.0
  temperature: 0.7
  max_tokens: 4096

# 人口生成パラメータ
population:
  default_size: 10000
  min_size: 100
  max_size: 10000

  # 人口統計分布（2020年国勢調査・総務省統計に基づく）
  demographics:
    # 年齢は population_generator.py の AGE_BRACKETS で国勢調査分布を使用
    gender:
      distribution: categorical
      # 2020年国勢調査: 男性48.7%, 女性51.3%
      weights: { male: 0.485, female: 0.510, other: 0.005 }
    education:
      distribution: categorical
      # 文部科学省・総務省労働力調査（25歳以上）
      weights:
        high_school: 0.42   # 高校・中学以下
        vocational: 0.20    # 専門学校・短期大学
        bachelor: 0.28      # 大学
        master: 0.07        # 大学院修士
        doctorate: 0.03     # 大学院博士
    income_bracket:
      distribution: categorical
      # 国税庁 民間給与実態統計調査（2021年）全18歳以上ベース
      weights:
        low: 0.30           # 200万円未満（無職・パート・学生含む）
        lower_middle: 0.32  # 200〜400万円
        upper_middle: 0.22  # 400〜600万円
        high: 0.12          # 600〜1000万円
        very_high: 0.04     # 1000万円超

  # Big Five パーソナリティ
  big_five:
    distribution: normal
    mean: 0.5
    std: 0.2

  # 社会ネットワーク
  network:
    type: hybrid
    k: 6          # 各ノードの近傍接続数
    beta: 0.3     # 再配線確率
    m: 3          # BA ネットワークの新規ノードあたり接続数
    ba_ratio: 0.3 # hybrid 時の BA エッジ割合 (0.0=WS のみ, 1.0=BA のみ)
    cluster_by_attributes: true

# 精度改善機能のオン/オフフラグ（replay 再現性確保用）
# false にすると対応機能を無効化してベースライン動作と比較できる
accuracy_improvements:
  single_llm_ensemble: true   # 単一LLM分布と混合（実測JSD 0.0181 vs swarm 0.179）
  memory_anchor: true          # FJ-MM 記憶効果（Step 8）
  confirmation_bias: true      # Motivated cognition 確証バイアス（Step 8）
  bayesian_param_opt: true     # Optuna TPE パラメータ推定（Step 8）
  event_loss_aversion: true    # Prospect Theory 非対称イベント効果（Step 9）
  event_two_phase_decay: true  # Two-phase event decay（Step 9）
  ipf_population_weights: true # IPF 代表性補正（Step 6）
  agreeableness_in_dynamics: true   # Agreeableness→confidence 閾値（改善3）
  hybrid_network: true              # Barabási-Albert ハイブリッドネットワーク（改善2）
  post_activation_persona: true     # ペルソナ生成を activation 後に移動（改善1）
  meeting_feedback_propagation: true  # 会議→母集団フィードバック伝播（改善4）
  episodic_memory: true               # 二層メモリ Layer B: テーマ付きエピソード記録+検索
  rolling_summary: true               # 二層メモリ Layer A: LLM性格要約
  # Wondrous Prancing Crayon: 純粋群知能 + 時間軸予測
  time_axis_orchestrator: true        # t0..t5 時系列予測 (デフォルトで有効化)
  cascade_propagation: false          # 多段階会話伝播 (society_orchestrator 統合は次フェーズ)
  bayesian_belief_update: false       # ベイジアン信念更新 (society_orchestrator 統合は次フェーズ)
  multi_outcome_market: false         # 多銘柄 LMSR (society_orchestrator 統合は次フェーズ)
  monte_carlo_ensemble: false         # Monte Carlo Ensemble (next phase)
  calibration_learner: false          # 自動キャリブレーション学習

  diversity_enforcement: false        # 多様性強制
  population_drift: false             # 人口 drift
  temporal_report: false              # 時系列統合レポート

ensemble:
  single_llm_beta: 0.85
