# OpenAI API 専用プロバイダ設定

providers:
  openai:
    type: openai
    model: gpt-5.4-nano
    api_base: https://api.openai.com/v1
    env_key: OPENAI_API_KEY
    cost_per_1k_input: 0.0002
    cost_per_1k_cached_input: 0.00002
    cost_per_1k_output: 0.00125
    enabled: true
    rate_limit:
      rpm: 500
      tpm: 200000
      max_concurrent: 20

  openai_shadow:
    type: openai
    model: gpt-5.4-nano
    api_base: https://api.openai.com/v1
    env_key: OPENAI_API_KEY
    allow_fallback: false
    reasoning_effort: low
    min_completion_tokens: 384
    cost_per_1k_input: 0.0002
    cost_per_1k_cached_input: 0.00002
    cost_per_1k_output: 0.00125
    enabled: true
    rate_limit:
      rpm: 500
      tpm: 200000
      max_concurrent: 10

  openai_escalation:
    type: openai
    model: gpt-5.6-luna
    api_base: https://api.openai.com/v1
    env_key: OPENAI_API_KEY
    allow_fallback: false
    reasoning_effort: low
    min_completion_tokens: 512
    cost_per_1k_input: 0.001
    cost_per_1k_cached_input: 0.0001
    cost_per_1k_output: 0.006
    enabled: true
    rate_limit:
      rpm: 200
      tpm: 200000
      max_concurrent: 5

# 既存データに古い provider 名が残っていても OpenAI へ集約する。
fallback_order:
  - openai
