# 日本の社会統計データ（グラウンディング用）
# 出典: 各省庁の公的統計
# 更新: 2023-2024年のデータを中心に収録

facts:
  - fact: "2023年時点で共働き世帯は1,278万世帯に達し、専業主婦世帯517万世帯の約2.5倍となり、共働きが標準的な家庭の形態となっている"
    source: "総務省 労働力調査 特別集計 2023年"
    date: "2024-02"
    category: social
    relevance_keywords: ["共働き", "女性就業", "ワークライフバランス", "育児", "家事分担", "専業主婦"]

  - fact: "2023年12月時点の生活保護受給世帯数は約165万世帯で、受給者数は約202万人となり、高齢者単身世帯の増加が受給世帯数を押し上げている"
    source: "厚生労働省 被保護者調査 2023年12月概数"
    date: "2024-03"
    category: social
    relevance_keywords: ["生活保護", "貧困", "社会保障", "セーフティネット", "生活困窮", "福祉", "格差"]

  - fact: "2021年の子どもの相対的貧困率は11.5%で、約9人に1人の子どもが貧困状態にあり、ひとり親世帯の貧困率は44.5%と極めて高い"
    source: "厚生労働省 国民生活基礎調査 2022年（2021年データ）"
    date: "2023-07"
    category: social
    relevance_keywords: ["子どもの貧困", "貧困", "格差", "ひとり親", "母子家庭", "教育格差", "経済的困難"]

  - fact: "世界経済フォーラムの2024年版ジェンダーギャップ指数で日本は146カ国中118位と、G7最下位が続いており、特に政治参画（113位）と経済参画（120位）の低さが際立つ"
    source: "世界経済フォーラム Global Gender Gap Report 2024"
    date: "2024-06"
    category: social
    relevance_keywords: ["ジェンダー", "男女格差", "女性活躍", "政治参画", "管理職", "女性", "平等"]

  - fact: "2023年の自殺者数は21,837人で、前年比44人減とほぼ横ばいだが、小中高生の自殺者数は513人と依然として深刻な水準にある"
    source: "厚生労働省・警察庁 自殺統計 2023年確定値"
    date: "2024-03"
    category: social
    relevance_keywords: ["自殺", "メンタルヘルス", "心の健康", "うつ", "若者", "孤独", "相談窓口"]

  - fact: "2023年度の小中学校の不登校児童生徒数は約34万6千人で過去最多を更新し、前年度比約4万7千人増と11年連続の増加となった"
    source: "文部科学省 児童生徒の問題行動・不登校等生徒指導上の諸課題に関する調査 2023年度"
    date: "2024-10"
    category: social
    relevance_keywords: ["不登校", "学校", "教育", "子ども", "いじめ", "フリースクール", "学校教育"]

  - fact: "2022年の介護離職者数は年間約10.6万人で、家族の介護を理由に仕事を辞めざるを得ない人が依然として多く、その約8割が女性である"
    source: "総務省 就業構造基本調査 2022年"
    date: "2023-07"
    category: social
    relevance_keywords: ["介護離職", "介護", "高齢者介護", "仕事と介護の両立", "家族介護", "ヤングケアラー"]

  - fact: "2024年4月1日時点の待機児童数は2,567人で前年比113人減と7年連続で減少し、ピーク時（2017年の26,081人）の約10分の1まで改善した"
    source: "こども家庭庁 保育所等関連状況取りまとめ 2024年4月1日"
    date: "2024-09"
    category: social
    relevance_keywords: ["待機児童", "保育所", "保育園", "子育て支援", "育児", "女性就業", "こども家庭庁"]

  - fact: "2023年の個人のSNS利用率は全体で80.8%に達し、年代別では13-19歳が91.4%、20-29歳が93.2%、30-39歳が90.5%、60-69歳でも60.6%と幅広い年代で普及している"
    source: "総務省 通信利用動向調査 2023年"
    date: "2024-06"
    category: social
    relevance_keywords: ["SNS", "ソーシャルメディア", "情報リテラシー", "ネット", "デジタル", "コミュニケーション"]

  - fact: "2023年の個人のインターネット利用率は86.2%で、13-59歳では各年代とも97%以上だが、70-79歳は65.5%、80歳以上は33.2%とデジタルデバイドが存在する"
    source: "総務省 通信利用動向調査 2023年"
    date: "2024-06"
    category: social
    relevance_keywords: ["インターネット", "デジタルデバイド", "IT", "情報格差", "高齢者", "デジタル化", "オンライン"]

  - fact: "2023年の刑法犯認知件数は70万3,351件で前年比17.0%増となり、コロナ禍で減少が続いた後初めて増加に転じ、特に窃盗犯が大幅に増加した"
    source: "警察庁 犯罪統計 2023年"
    date: "2024-02"
    category: social
    relevance_keywords: ["犯罪", "治安", "窃盗", "安全", "防犯", "刑法犯", "社会不安"]

  - fact: "2023年の孤独死（自宅での独居死）の推定件数は約6.8万人で、単身高齢者の増加に伴い社会問題化している"
    source: "警察庁 令和5年における死体取扱状況"
    date: "2024-04"
    category: social
    relevance_keywords: ["孤独死", "孤立", "単身世帯", "高齢者", "見守り", "地域社会", "独居"]
