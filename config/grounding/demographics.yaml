# 日本の人口統計データ（グラウンディング用）
# 出典: 各省庁の公的統計
# 更新: 2023-2024年のデータを中心に収録

facts:
  - fact: "2023年10月1日時点の日本の総人口は1億2,435万2千人で、前年比59万5千人減少（-0.48%）と13年連続の減少となった"
    source: "総務省 人口推計 2023年10月1日現在"
    date: "2024-04"
    category: demographics
    relevance_keywords: ["人口", "人口減少", "少子化", "過疎化", "日本の将来", "社会保障"]

  - fact: "2023年の合計特殊出生率は1.20と過去最低を更新し、8年連続で低下した"
    source: "厚生労働省 人口動態統計 2023年"
    date: "2024-06"
    category: demographics
    relevance_keywords: ["出生率", "少子化", "合計特殊出生率", "子育て", "人口減少", "出産", "育児"]

  - fact: "2023年10月1日時点の65歳以上人口は3,623万人で、総人口に占める割合（高齢化率）は29.1%と過去最高を更新した"
    source: "総務省 人口推計 2023年10月1日現在"
    date: "2024-04"
    category: demographics
    relevance_keywords: ["高齢化", "高齢者", "超高齢社会", "年金", "介護", "社会保障", "医療費"]

  - fact: "2023年10月1日時点の生産年齢人口（15-64歳）は7,395万人で、総人口の59.5%まで低下し、1992年のピーク（8,726万人）から約1,331万人減少した"
    source: "総務省 人口推計 2023年10月1日現在"
    date: "2024-04"
    category: demographics
    relevance_keywords: ["生産年齢人口", "労働力", "人手不足", "働き手", "労働人口", "現役世代"]

  - fact: "2023年の東京圏（東京都・神奈川県・埼玉県・千葉県）への転入超過数は約12万6千人で、コロナ禍で一時縮小した東京一極集中が再び拡大した"
    source: "総務省 住民基本台帳人口移動報告 2023年"
    date: "2024-01"
    category: demographics
    relevance_keywords: ["東京一極集中", "地方創生", "人口移動", "都市部", "過疎", "地方", "首都圏"]

  - fact: "2023年1月1日時点の世帯数は5,431万世帯で、平均世帯人員は2.25人と単身世帯の増加により過去最低を更新し続けている"
    source: "総務省 住民基本台帳に基づく人口・世帯数 2023年"
    date: "2023-07"
    category: demographics
    relevance_keywords: ["世帯", "単身世帯", "核家族", "一人暮らし", "家族構成", "世帯人員", "独居"]

  - fact: "2023年末時点の在留外国人数は341万992人で過去最多を更新し、前年末比10.9%増と急増した"
    source: "出入国在留管理庁 在留外国人統計 2023年末"
    date: "2024-03"
    category: demographics
    relevance_keywords: ["外国人", "在留外国人", "移民", "多文化共生", "外国人労働者", "国際化", "技能実習"]

  - fact: "2023年の日本人の平均寿命は男性81.09年、女性87.14年で、男女ともに3年ぶりに前年を上回った"
    source: "厚生労働省 簡易生命表 2023年"
    date: "2024-07"
    category: demographics
    relevance_keywords: ["平均寿命", "長寿", "健康寿命", "高齢化", "医療", "死亡率", "長生き"]

  - fact: "2023年の婚姻件数は48万9,281組で前年比-5.9%と減少し、婚姻率は人口千対3.99と過去最低を更新した"
    source: "厚生労働省 人口動態統計 2023年"
    date: "2024-06"
    category: demographics
    relevance_keywords: ["結婚", "婚姻", "未婚", "晩婚化", "少子化", "婚活", "独身"]

  - fact: "2023年の出生数は72万7,277人で過去最少を更新し、初めて80万人を割った前年からさらに約4万人減少した"
    source: "厚生労働省 人口動態統計 2023年"
    date: "2024-06"
    category: demographics
    relevance_keywords: ["出生数", "少子化", "赤ちゃん", "出産", "子ども", "人口減少", "産院"]

  - fact: "国立社会保障・人口問題研究所の推計（2023年推計）によれば、2056年に日本の総人口は1億人を下回り、2070年には8,700万人にまで減少する見通しである"
    source: "国立社会保障・人口問題研究所 日本の将来推計人口 2023年推計"
    date: "2023-04"
    category: demographics
    relevance_keywords: ["人口推計", "将来推計", "人口減少", "少子高齢化", "日本の未来", "2050年問題"]

  - fact: "2023年の死亡数は157万5,936人で過去最多となり、出生数との差である自然減は84万8,659人と過去最大の減少幅を記録した"
    source: "厚生労働省 人口動態統計 2023年"
    date: "2024-06"
    category: demographics
    relevance_keywords: ["死亡数", "自然減", "人口減少", "多死社会", "高齢化", "出生数"]
