# 日本の経済統計データ（グラウンディング用）
# 出典: 各省庁の公的統計
# 更新: 2023-2024年のデータを中心に収録

facts:
  - fact: "2023年度の日本の名目GDPは約591.5兆円で、ドル建てでは約4.2兆ドルとなりドイツに抜かれ世界第4位に後退した"
    source: "内閣府 国民経済計算 2023年度"
    date: "2024-01"
    category: economy
    relevance_keywords: ["GDP", "経済成長", "国内総生産", "経済規模", "名目GDP", "国際比較", "景気"]

  - fact: "2023年度の実質GDP成長率は前年度比+1.2%で、コロナ禍からの回復が続いたが物価上昇の影響で名目と実質の乖離が拡大した"
    source: "内閣府 国民経済計算 2023年度"
    date: "2024-01"
    category: economy
    relevance_keywords: ["実質GDP", "経済成長率", "景気回復", "物価", "デフレ脱却", "インフレ"]

  - fact: "2023年の実質賃金は前年比-2.5%と2年連続の減少となり、名目賃金は上昇したものの物価上昇に追いつかなかった"
    source: "厚生労働省 毎月勤労統計調査 2023年"
    date: "2024-02"
    category: economy
    relevance_keywords: ["実質賃金", "賃金", "給与", "所得", "物価上昇", "生活水準", "労働者", "購買力"]

  - fact: "2023年の消費者物価指数（CPI、生鮮食品除く総合）は前年比+3.1%上昇し、1982年以来41年ぶりの高水準となった"
