    date: "2024-01"
    category: economy
    relevance_keywords: ["物価", "消費者物価指数", "CPI", "インフレ", "値上げ", "生活費", "食料品価格"]

  - fact: "2023年平均の完全失業率は2.6%で、前年と同水準の低い失業率を維持した"
