services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: agentai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentai"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./config:/app/config:ro
      - ./templates:/app/templates:ro
      - appdata:/app/data
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY must be set}
      CODEX_REVIEW_ENABLED: "false"
      LLM_MODEL: ${LLM_MODEL:-gpt-5.4-nano}
      COGNITIVE_MODE: ${COGNITIVE_MODE:-advanced}
      MAX_ACTIVE_AGENTS: ${MAX_ACTIVE_AGENTS:-200}
      MAX_CONCURRENT_AGENTS: ${MAX_CONCURRENT_AGENTS:-20}
      MAX_CONCURRENT_COLONIES: ${MAX_CONCURRENT_COLONIES:-5}
      LLM_CACHE_TTL: ${LLM_CACHE_TTL:-3600}
      DATABASE_URL: postgresql+asyncpg://agentai:${POSTGRES_PASSWORD}@postgres:5432/agentai
      REDIS_URL: redis://redis:6379/0
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      ANALYTICS_ADMIN_TOKEN: ${ANALYTICS_ADMIN_TOKEN:?ANALYTICS_ADMIN_TOKEN must be set}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import json,sys,urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health')); sys.exit(0 if data.get('status') == 'ok' else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3300:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 3s
      retries: 10

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      frontend:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  appdata:
