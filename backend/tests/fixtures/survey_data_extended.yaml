    theme_category: "healthcare"
    relevance_keywords:
      - "ワクチン"
      - "義務化"
      - "公衆衛生"
      - "感染症対策"
    stance_distribution:
      賛成: 0.10
      条件付き賛成: 0.15
      中立: 0.20
      条件付き反対: 0.25
      反対: 0.30

