surveys:
  # ===== Healthcare (医療) =====
  - theme: "国民皆保険改革"
    question: "国民皆保険制度の自己負担割合を見直すべきだと思いますか"
    source: "全国紙合同世論調査 2024年2月"
    survey_date: "2024-02"
    sample_size: 2000
    method: "電話調査 (RDD)"
    theme_category: "healthcare"
    relevance_keywords:
      - "国民皆保険"
      - "医療費"
      - "自己負担"
      - "社会保障"
    stance_distribution:
      賛成: 0.08
      条件付き賛成: 0.15
      中立: 0.20
      条件付き反対: 0.27
      反対: 0.30

  - theme: "ワクチン接種義務化"
